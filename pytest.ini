[pytest]
# 1. Default CLI arguments
# -v: Verbose output
# -s: Allow print statements to show up in the terminal
# --strict-markers: Fails the test run if someone uses an unregistered marker name
addopts = -v -s --strict-markers --alluredir=allure-results

# 2. Test Discovery Configuration
# Tells pytest exactly where to look and what file/function naming conventions to match
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 3. Register Custom Markers (Tags)
# This prevents warnings and organizes tests into logical suites
markers =
    smoke: Critical, high-priority tests checking core functionality
    regression: Full suite tests for comprehensive coverage
    user_management: Tests tied explicitly to user endpoint operations